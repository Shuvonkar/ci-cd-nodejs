name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests and capture results
        run: |
          npm run check 2>&1 | tee test-results.txt
          echo "Exit code: $?" >> test-results.txt

      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt

  deploy:
    name: Deploy Job
    runs-on: self-hosted
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download test results artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results

      - name: Display test results
        run: |
          echo "========== TEST RESULTS =========="
          cat test-results.txt
          echo "=================================="

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Deploy with PM2
        run: |
          pm2 delete node-app || true
          pm2 start "$(pwd)/src/server.js" --name node-app
          pm2 save --force
          sleep 2
          echo "✅ Application deployed successfully"
          pm2 status
